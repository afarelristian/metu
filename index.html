<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logout Hotspot - Sekolah Alam Aminah</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-photo"></div>
<div class="bg-overlay"></div>

<div class="page-wrapper">

  <div class="logout-card zoom-in">

    <div class="check-icon">
      <i class="fa-solid fa-check"></i>
    </div>

    <h2 class="card-title">Terima Kasih</h2>
    <p class="card-subtitle">
      Anda telah berhasil keluar dari jaringan Hotspot Sekolah Alam Aminah.
    </p>

    <div class="status-box">
      <span class="status-label">Status</span>
      <span class="status-value"><i class="fa-solid fa-circle-check me-1"></i> Logout Berhasil</span>
    </div>

    <p class="wish-text">
      Sampai jumpa kembali. Semoga aktivitas belajar Anda menyenangkan.
    </p>

    <div class="btn-group-custom">
      <a href="$(link-login)" class="btn-primary-custom">
        <i class="fa-solid fa-right-to-bracket me-2"></i> Login Kembali
      </a>
      <a href="https://sekolahalamaminah.sch.id" class="btn-secondary-custom" target="_blank" rel="noopener">
        <i class="fa-solid fa-house me-2"></i> Kembali ke Website Sekolah
      </a>
    </div>

  </div>

  <footer class="page-footer">
    &copy; 2026 Sekolah Alam Aminah
  </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
